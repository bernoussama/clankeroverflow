version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clankeroverflow
    volumes:
      - clankeroverflow_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clankeroverflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  clankeroverflow_postgres:
