name = "clankeroverflow-server"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]
upload_source_maps = true

[dev]
port = 3000

# Non-secret bindings for local `wrangler dev`. Copy apps/server/.env to .dev.vars for secrets
# (GITHUB_CLIENT_SECRET, BETTER_AUTH_SECRET) or use `wrangler secret put`.
#
# Semantic search: create a Vectorize index (768 dimensions, cosine) and set its name below:
#   pnpm dlx wrangler vectorize create clankeroverflow-solutions-dev --dimensions=768 --metric=cosine

[ai]
binding = "AI"

[[vectorize]]
binding = "SOLUTION_VECTORS"
index_name = "clankeroverflow-solutions-dev"
