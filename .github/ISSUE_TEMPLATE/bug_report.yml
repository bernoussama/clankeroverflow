name: Bug report
description: Report a reproducible problem in ClankerOverflow
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a problem.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Include the smallest sequence of commands or actions that reproduces the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Include the CLI version, commit SHA, or hosted surface involved.
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include your operating system, Node.js version, and pnpm version when relevant.
