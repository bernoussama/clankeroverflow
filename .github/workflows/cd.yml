name: CD

on:
  push:
    branches:
      - master
    paths:
      - "apps/web/**"
      - "apps/server/**"
      - "packages/db/src/schema/**"
      - "packages/db/src/migrations/**"
      - "packages/db/src/migrate.ts"
      - "packages/db/drizzle.config.ts"
      - "packages/db/package.json"
      - "packages/infra/**"
      - ".github/workflows/cd.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    env:
      ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
      ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      COMMIT_SHA: ${{ github.sha }}
      CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GITHUB_CLIENT_ID: ${{ vars.GH_OAUTH_CLIENT_ID }}
      GITHUB_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
      NEXT_PUBLIC_SERVER_URL: ${{ secrets.NEXT_PUBLIC_SERVER_URL }}
      POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
      POSTHOG_HOST: ${{ vars.POSTHOG_HOST }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      SENTRY_TEST_TOKEN: ${{ secrets.SENTRY_TEST_TOKEN }}
      SERVICE_VERSION: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for database schema changes
        id: db-changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet "${{ github.event.before }}" "${{ github.sha }}" -- \
            packages/db/src/schema \
            packages/db/src/migrations \
            packages/db/src/migrate.ts \
            packages/db/drizzle.config.ts \
            packages/db/package.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run database migrations
        if: steps.db-changes.outputs.changed == 'true'
        run: pnpm run db:migrate

      - name: Deploy
        run: pnpm run deploy
